version: "3.9"

services:
  # ── Backend: Express API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dall-ai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - HF_TOKEN=${HF_TOKEN}
    networks:
      - dall-ai-network

  # ── Frontend: React + Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ./DALL-AI
      dockerfile: Dockerfile
    container_name: dall-ai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dall-ai-network

networks:
  dall-ai-network:
    driver: bridge
